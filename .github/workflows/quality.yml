name: Repository quality

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Validate metadata, navigation, links, headings, and wordlists
        run: node scripts/quality-check.mjs
      - name: Scan committed content for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  markdown-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check external and internal Markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --accept 200,206,429 "**/*.md"
          fail: true
